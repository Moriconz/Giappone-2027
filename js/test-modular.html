<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Modular Structure</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .item { margin: 10px 0; padding: 10px; background: white; border-left: 3px solid; }
        .ok { border-left-color: green; }
        .err { border-left-color: red; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <h1>✅ Test Modular Structure</h1>
    <p>Verifica che tutti i moduli siano caricati correttamente.</p>
    
    <div id="results"></div>
    
    <script>
        const tests = [];
        
        function check(name, fn) {
            try {
                const result = fn();
                tests.push({ name, status: 'ok', msg: result });
            } catch(e) {
                tests.push({ name, status: 'err', msg: e.message });
            }
        }
        
        // Carica il file
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = 'index.html';
        document.body.appendChild(iframe);
        
        iframe.onload = () => {
            const w = iframe.contentWindow;
            
            console.log('Window keys:', Object.keys(w).filter(k => k.startsWith('state') || k.includes('AI') || k.includes('GPS')));
            
            // Module: state.js
            check('window.state exists', () => typeof w.state === 'object' ? '✓ Object' : 'NOT FOUND');
            check('window.saveState', () => typeof w.saveState === 'function' ? '✓ Function' : 'NOT FOUND');
            
            // Module: features-ai.js
            check('window.aiHistory', () => Array.isArray(w.aiHistory) ? '✓ Array' : typeof w.aiHistory);
            check('window.sendAIMessage', () => typeof w.sendAIMessage === 'function' ? '✓' : 'NOT FOUND');
            check('window.callGeminiAPI', () => typeof w.callGeminiAPI === 'function' ? '✓' : 'NOT FOUND');
            check('window.renderAIChat', () => typeof w.renderAIChat === 'function' ? '✓' : 'NOT FOUND');
            check('window.saveAIConfig', () => typeof w.saveAIConfig === 'function' ? '✓' : 'NOT FOUND');
            check('window.loadAIConfig', () => typeof w.loadAIConfig === 'function' ? '✓' : 'NOT FOUND');
            check('window.getAIQuotaStatus', () => typeof w.getAIQuotaStatus === 'function' ? '✓' : 'NOT FOUND');
            
            // Module: features-gps.js
            check('window.makeHubId', () => typeof w.makeHubId === 'function' ? '✓' : 'NOT FOUND');
            check('window.makePeerId', () => typeof w.makePeerId === 'function' ? '✓' : 'NOT FOUND');
            check('window.ensureHubAndMembersConnected', () => typeof w.ensureHubAndMembersConnected === 'function' ? '✓' : 'NOT FOUND');
            check('window.toggleWakeLock', () => typeof w.toggleWakeLock === 'function' ? '✓' : 'NOT FOUND');
            check('window.setupWakeLockToggle', () => typeof w.setupWakeLockToggle === 'function' ? '✓' : 'NOT FOUND');
            check('window.startHeartbeatMonitoring', () => typeof w.startHeartbeatMonitoring === 'function' ? '✓' : 'NOT FOUND');
            check('window.validateGroupSetup', () => typeof w.validateGroupSetup === 'function' ? '✓' : 'NOT FOUND');
            
            // Module: ui-helpers.js
            check('window.escapeHtml', () => typeof w.escapeHtml === 'function' ? '✓' : 'NOT FOUND');
            check('window.formatAIReply', () => typeof w.formatAIReply === 'function' ? '✓' : 'NOT FOUND');
            
            // Render results
            const resultsDiv = document.getElementById('results');
            
            let section = null;
            tests.forEach((t, idx) => {
                const newSection = t.name.split('.')[0];
                if (newSection !== section) {
                    const h2 = document.createElement('h2');
                    h2.textContent = newSection;
                    resultsDiv.appendChild(h2);
                    section = newSection;
                }
                
                const div = document.createElement('div');
                div.className = `item ${t.status === 'ok' ? 'ok' : 'err'}`;
                div.innerHTML = `<strong>${t.name}</strong>: ${t.msg}`;
                resultsDiv.appendChild(div);
            });
            
            const summary = document.createElement('div');
            const okCount = tests.filter(t => t.status === 'ok').length;
            summary.style.marginTop = '30px';
            summary.style.fontWeight = 'bold';
            summary.style.fontSize = '18px';
            summary.innerHTML = `<p>${okCount}/${tests.length} funzioni caricate ✓</p>`;
            if (okCount === tests.length) {
                summary.innerHTML += `<p style="color: green;">🎉 Tutto caricato correttamente!</p>`;
            }
            resultsDiv.appendChild(summary);
        };
        
        iframe.onerror = (e) => {
            document.getElementById('results').innerHTML = `<div class="item err"><strong>Errore caricamento:</strong> ${e}</div>`;
        };
    </script>
</body>
</html>
